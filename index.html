<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Énigme du Professeur - Bastien</title>

<link href="https://fonts.googleapis.com/css2?family=Lora&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Lora', serif;
    background-image: url("images/background.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

#game {
    width: 95vw;
    max-width: 95vw;
    margin: 0 auto;
}

/* Wrapper pour nom + portrait */
#speakerWrapper {
    display: flex;
    align-items: flex-end; /* nom aligné avec le bas du portrait */
    justify-content: flex-start;
    margin-bottom: 10px;
    gap: 20px;
}

/* Nom du personnage */
#speaker {
    display: inline-block;
    background: #3a2f24;
    border: 4px solid #c8a66a;
    border-radius: 8px;
    color: #c8a66a;
    font-weight: bold;
    text-align: center;
    font-size: clamp(18px, 6vw, 50px);
    padding: clamp(6px,2vw,14px) clamp(10px,4vw,20px);
    min-width: 120px;
}

/* Portrait */
#portrait {
    display: block;
    height: auto;
    max-width: 40vw;
    max-height: 60vh;
    object-fit: contain;
    border-radius: 10px;
    transition: opacity 0.3s ease, transform 0.3s ease;
    opacity: 1;
    transform: scale(1);
}

/* Boîte de dialogue */
#dialogueBox {
    background: #3a2f24;
    border: 4px solid #c8a66a;
    border-radius: 10px;
    color: #c8a66a;
    line-height: 1.4em;
    font-size: clamp(16px, 5vw, 62px);
    padding: clamp(15px,4vw,25px);
    min-height: 80px;
}

/* Texte */
#text {
    line-height: 1.4em;
}

/* Boutons */
button {
    margin-top: 15px;
    background: #c8a66a;
    color: #3a2f24;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    -webkit-appearance: none;
    font-size: clamp(14px,4.5vw,62px);
    padding: clamp(10px,3vw,20px) clamp(15px,5vw,25px);
}

/* Ajustements pour très petits écrans */
@media (max-width: 480px) {
    #portrait {
        max-width: 70vw;
        max-height: clamp(150px, 50vh, 1300px);
    }
}

</style>
</head>

<body>

<div id="game">

    <!-- wrapper pour le nom et le portrait -->
    <div id="speakerWrapper">
        <div id="speaker"></div>
        <img id="portrait" src="" alt="Portrait" />
    </div>

    <!-- boîte de dialogue -->
    <div id="dialogueBox">
        <div id="text"></div>
    </div>

    <!-- boutons -->
    <div style="margin-top:0px;">
        <button id="prev" onclick="previous()">◀ Précédent</button>
        <button id="next" onclick="next()">Suivant ▶</button>
    </div>

</div>

<script>
// Dialogue
const dialogue = [
{speaker:"Assistant", text:"Professeur… Notre ami semble avoir laissé derrière lui les stades et les exploits éclatants.", portrait:"images/Assistant.png"},

{speaker:"Professeur", text:"Vraiment ? Voilà qui est surprenant. Lui qui parlait autrefois de puissance et de stratégie…", portrait:"images/Professeur.png"},

{speaker:"Assistant", text:"Justement. Il ne parle plus de vitesse. Ni de victoire spectaculaire.", portrait:"images/Assistant.png"},

{speaker:"Assistant", text:"Il parle de fauteuils confortables. De lumières tamisées. Et d’un certain attachement… aux choses d’un autre temps.", portrait:"images/Assistant.png"},

{speaker:"Professeur", text:"Ah… Un homme qui ralentit n’abandonne pas nécessairement la partie. Il change parfois simplement de terrain.", portrait:"images/Professeur.png"},

{speaker:"Assistant", text:"Il écoute de vieux morceaux sur vinyle. Il affectionne les ambiances feutrées.", portrait:"images/Assistant.png"},

{speaker:"Professeur", text:"Intéressant… Nous avons donc un compétiteur qui ne cherche plus à impressionner par la force… mais peut-être par la finesse.", portrait:"images/Professeur.png"},

{speaker:"Assistant", text:"Vous pensez qu’il prépare quelque chose, Professeur ?", portrait:"images/Assistant.png"},

{speaker:"Professeur", text:"Mon cher ami… Lorsqu’un stratège troque la lumière des projecteurs contre l’ombre chaleureuse d’une pièce tranquille… ce n’est pas un retrait.", portrait:"images/Professeur.png"},

{speaker:"Professeur", text:"C’est souvent le début… d’un nouveau défi.", portrait:"images/Professeur.png"},

{speaker:"Professeur", text:"La véritable question n’est donc pas : « Que faisait-il autrefois ? »", portrait:"images/Professeur.png"},

{speaker:"Professeur", text:"Mais plutôt : « Quel jeu, plus subtil, plus mature, s’apprête-t-il à maîtriser ? »", portrait:"images/Professeur.png"},

{speaker:"Professeur", text:"Et maintenant, place à l'énigme !", portrait:"images/Professeur.png"},

{speaker:"Énigme", text:"Les héros ne courent plus toujours sous les projecteurs. Certains préfèrent les lumières tamisées."},

{speaker:"Énigme", text:"Le temps a passé. Le cuir a vieilli. Les baskets ont laissé place à des chaussures plus sages."},

{speaker:"Énigme", text:"Il ne cherche plus le vacarme des stades. Mais le murmure feutré d’un vieux vinyle qui crépite."},

{speaker:"Énigme", text:"Stratégie toujours. Mais plus lente. Plus précise. Plus maîtrisée."},

{speaker:"Énigme", text:"Il aime ce qui a du caractère. Ce qui se bonifie avec les années. Ce qui ne se consomme pas à la hâte."},

{speaker:"Énigme", text:"Son terrain n’est plus une pelouse. C’est une table en bois marquée par le temps."},

{speaker:"Énigme", text:"Son maillot ? Un pull confortable."},

{speaker:"Énigme", text:"Son vestiaire ? Une pièce aux lumières chaudes, où l’on parle peu mais où l’on savoure."},

{speaker:"Énigme", text:"Il ne s’agit plus de marquer en force. Mais de reconnaître les nuances. D’anticiper les arômes. D’écouter ce que révèle chaque note."},

{speaker:"Énigme", text:"Car dans ce nouveau jeu, on observe la robe avant l’attaque. On respire avant d’agir. On laisse le temps faire son œuvre."},

{speaker:"Énigme", text:"Ici, la victoire ne se crie pas. Elle se déguste."},

{speaker:"Énigme", text:"Alors, détective Bastien …"},

{speaker:"Énigme", text:"Si le protagoniste aime les ambiances feutrées, les choses authentiques, la musique d’un autre temps, les plaisirs simples mais raffinés,"},

{speaker:"Énigme", text:"Dans quel match discret devra-t-il prouver aujourd’hui la finesse de son palais plutôt que la puissance de son bras ?"},

{speaker:"Énigme", text:"Quel terrain mousseux l’attend désormais ?"},

{speaker:"Le Mioki", text:"À toi de répondre maintenant, détective Bastien le tout petit."},
];

let index = 0;

function show() {
    const current = dialogue[index];
    const portrait = document.getElementById("portrait");
    const speaker = document.getElementById("speaker");

    speaker.innerText = current.speaker;
    document.getElementById("text").innerText = current.text;

    if(current.portrait){
        // fade-out
        portrait.style.opacity = 0;
        portrait.style.transform = "scale(0.95)";
        setTimeout(() => {
            portrait.src = current.portrait;
            portrait.style.opacity = 1;       // fade-in
            portrait.style.transform = "scale(1)"; // petit zoom
        }, 150);
        portrait.style.display = "block";
    } else {
        portrait.style.display = "none";
        portrait.src = "";
    }

    updateButtons();
}

function previous(){
    if(index > 0){
        index--;
        show();
    }
}

function next(){
    if(index < dialogue.length - 1){
        index++;
        show();
    }
}

function updateButtons(){
    document.getElementById("prev").disabled = (index === 0);
    document.getElementById("next").disabled = (index === dialogue.length - 1);
}

// initialisation
show();
</script>
</body>
</html>
